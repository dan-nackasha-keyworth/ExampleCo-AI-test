<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Triage - Batch Progress</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; margin: 3rem auto; max-width: 640px; color: #1a1a1a; background: #fafaf8; }
  h1 { font-size: 20px; font-weight: 500; }
  .bar-track { background: #e3e1da; border-radius: 8px; height: 22px; overflow: hidden; margin: 1.5rem 0 0.5rem; }
  .bar-fill { background: #1d9e75; height: 100%; width: 0%; transition: width 0.4s ease; }
  .bar-fill.complete { background: #3b6d11; }
  .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 1rem; font-size: 14px; }
  .stats div { background: #fff; border: 1px solid #e3e1da; border-radius: 8px; padding: 8px 14px; }
  .stats .label { font-size: 11px; color: #666; }
  .stats .value { font-size: 16px; font-weight: 500; }
  #status-line { font-size: 13px; color: #666; margin-top: 1rem; }
  #not-running { display: none; color: #791f1f; margin-top: 1rem; font-size: 13px; }
</style>
</head>
<body>
<h1>AI triage - batch run progress</h1>
<div class="bar-track"><div class="bar-fill" id="bar"></div></div>
<div id="percent-label" style="font-size:13px; color:#666;">0%</div>

<div class="stats">
  <div><div class="label">Processed</div><div class="value" id="current">0 / 0</div></div>
  <div><div class="label">Elapsed</div><div class="value" id="elapsed">-</div></div>
  <div><div class="label">Est. remaining</div><div class="value" id="remaining">-</div></div>
  <div><div class="label">Avg / message</div><div class="value" id="avg">-</div></div>
</div>
<div id="status-line">Last message: -</div>
<div id="not-running">No progress file found yet - start a batch_runner.py run to see live progress here.</div>

<script>
function fmtSeconds(s) {
  if (s === null || s === undefined) return "-";
  if (s < 60) return Math.round(s) + "s";
  const m = Math.floor(s / 60);
  const rem = Math.round(s % 60);
  return m + "m " + rem + "s";
}

async function poll() {
  try {
    const resp = await fetch("outputs/progress.json?t=" + Date.now(), { cache: "no-store" });
    if (!resp.ok) throw new Error("not found");
    const data = await resp.json();
    document.getElementById("not-running").style.display = "none";

    const bar = document.getElementById("bar");
    bar.style.width = data.percent + "%";
    bar.classList.toggle("complete", data.status === "complete");

    document.getElementById("percent-label").textContent = data.percent + "% " + (data.status === "complete" ? "(complete)" : "(running)");
    document.getElementById("current").textContent = data.current + " / " + data.total;
    document.getElementById("elapsed").textContent = fmtSeconds(data.elapsed_seconds);
    document.getElementById("remaining").textContent = data.status === "complete" ? "-" : fmtSeconds(data.estimated_remaining_seconds);
    document.getElementById("avg").textContent = data.avg_seconds_per_message ? data.avg_seconds_per_message + "s" : "-";
    document.getElementById("status-line").textContent = "Last message: " + (data.last_message_id || "-") + " | updated " + new Date(data.updated_at).toLocaleTimeString();
  } catch (e) {
    document.getElementById("not-running").style.display = "block";
  }
}

poll();
setInterval(poll, 1000);
</script>
</body>
</html>
